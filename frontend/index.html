<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDP Workflow - SignalR Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00d9ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
        }
        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        .status-dot.connecting {
            background: #ffaa00;
            animation: pulse 1s infinite;
        }
        .status-dot.error {
            background: #ff4444;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input, button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }
        input {
            background: #2a2a4a;
            color: #eee;
            width: 300px;
        }
        input::placeholder {
            color: #888;
        }
        button {
            background: #00d9ff;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover {
            background: #00b8d9;
            transform: translateY(-1px);
        }
        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        button.danger {
            background: #ff4444;
            color: white;
        }
        button.danger:hover {
            background: #cc3333;
        }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 800px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: #2a2a4a;
            border-radius: 10px;
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
        }
        .panel h2 {
            color: #00d9ff;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5a;
        }
        .message {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00d9ff;
        }
        .message.step-started {
            border-left-color: #ffaa00;
        }
        .message.step-completed {
            border-left-color: #00ff88;
        }
        .message.step-failed {
            border-left-color: #ff4444;
        }
        .message.hitl {
            border-left-color: #ff66ff;
        }
        .message.reasoning {
            border-left-color: #66aaff;
        }
        .message.workflow-completed {
            border-left-color: #00ff88;
            background: #1a2a1a;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .message-type {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: #00d9ff;
        }
        .message-time {
            font-size: 11px;
            color: #888;
        }
        .message-content {
            font-size: 13px;
            line-height: 1.5;
            color: #ccc;
        }
        .message-data {
            margin-top: 8px;
            padding: 8px;
            background: #0a0a1e;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .step-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .step-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #3a3a5a;
            color: #888;
        }
        .step-badge.running {
            background: #332a00;
            color: #ffaa00;
            animation: pulse 1s infinite;
        }
        .step-badge.completed {
            background: #1a331a;
            color: #00ff88;
        }
        .step-badge.failed {
            background: #331a1a;
            color: #ff4444;
        }
        .empty-state {
            color: #666;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }
        .info-bar {
            background: #2a2a4a;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-item {
            font-size: 13px;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            color: #00d9ff;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-dot" id="statusDot"></span>
            IDP Workflow Monitor
        </h1>

        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">Status:</span>
                <span class="info-value" id="connectionStatus">Disconnected</span>
            </div>
            <div class="info-item">
                <span class="info-label">Instance:</span>
                <span class="info-value" id="currentInstance">None</span>
            </div>
            <div class="info-item">
                <span class="info-label">Messages:</span>
                <span class="info-value" id="messageCount">0</span>
            </div>
        </div>

        <div class="controls">
            <button id="connectBtn" onclick="connect()">Connect to SignalR</button>
            <input type="text" id="instanceId" placeholder="Enter Instance ID to subscribe...">
            <button id="subscribeBtn" onclick="subscribe()" disabled>Subscribe</button>
            <button id="unsubscribeBtn" onclick="unsubscribe()" disabled class="danger">Unsubscribe</button>
            <button onclick="clearMessages()">Clear Messages</button>
        </div>

        <div class="step-progress" id="stepProgress">
            <div class="step-badge" data-step="step_01_pdf_extraction">1. PDF Extract</div>
            <div class="step-badge" data-step="step_02_classification">2. Classify</div>
            <div class="step-badge" data-step="step_03_01_azure_extraction">3a. Azure</div>
            <div class="step-badge" data-step="step_03_02_dspy_extraction">3b. DSPy</div>
            <div class="step-badge" data-step="step_04_comparison">4. Compare</div>
            <div class="step-badge" data-step="step_05_human_review">5. HITL</div>
            <div class="step-badge" data-step="step_06_reasoning_agent">6. Reasoning</div>
        </div>

        <div class="panels">
            <div class="panel">
                <h2>📡 All Events</h2>
                <div id="allMessages">
                    <div class="empty-state">No messages yet. Connect and subscribe to a workflow.</div>
                </div>
            </div>
            <div class="panel">
                <h2>🤖 Reasoning Stream</h2>
                <div id="reasoningMessages">
                    <div class="empty-state">Reasoning chunks will appear here during Step 6.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:7071/api';
        // const API_BASE = 'https://idp-workbench.azurewebsites.net/api';
        const HOST_KEY = 'O4M4_JY9de14s5Oc7uLpcHSHVbs2X_we98p8psYIv7VgAzFuP-pVNw==';
        let connection = null;
        let connectionId = null;
        let messageCount = 0;
        let currentInstanceId = null;

        // DOM elements
        const statusDot = document.getElementById('statusDot');
        const connectionStatus = document.getElementById('connectionStatus');
        const currentInstance = document.getElementById('currentInstance');
        const messageCountEl = document.getElementById('messageCount');
        const connectBtn = document.getElementById('connectBtn');
        const subscribeBtn = document.getElementById('subscribeBtn');
        const unsubscribeBtn = document.getElementById('unsubscribeBtn');
        const instanceIdInput = document.getElementById('instanceId');
        const allMessagesEl = document.getElementById('allMessages');
        const reasoningMessagesEl = document.getElementById('reasoningMessages');

        function updateStatus(status) {
            connectionStatus.textContent = status;
            statusDot.className = 'status-dot';
            
            if (status === 'Connected') {
                statusDot.classList.add('connected');
            } else if (status === 'Connecting...') {
                statusDot.classList.add('connecting');
            } else if (status.includes('Error')) {
                statusDot.classList.add('error');
            }
        }

        async function connect() {
            try {
                updateStatus('Connecting...');
                connectBtn.disabled = true;

                // Get SignalR connection info
                const response = await fetch(`${API_BASE}/idp/negotiate?code=${HOST_KEY}`, { method: 'POST' });
                
                if (!response.ok) {
                    throw new Error(`Negotiate failed: ${response.status}`);
                }

                const { url, accessToken } = await response.json();
                console.log('Got SignalR connection info:', url);

                // Build connection
                connection = new signalR.HubConnectionBuilder()
                    .withUrl(url, { accessTokenFactory: () => accessToken })
                    .withAutomaticReconnect([0, 2000, 5000, 10000, 30000])
                    .configureLogging(signalR.LogLevel.Information)
                    .build();

                // Set up event handlers
                setupEventHandlers();

                // Connection state handlers
                connection.onreconnecting(() => {
                    updateStatus('Reconnecting...');
                });

                connection.onreconnected(() => {
                    updateStatus('Connected');
                    if (currentInstanceId) {
                        subscribe(); // Re-subscribe after reconnect
                    }
                });

                connection.onclose(() => {
                    updateStatus('Disconnected');
                    connectBtn.disabled = false;
                    subscribeBtn.disabled = true;
                    unsubscribeBtn.disabled = true;
                    connectionId = null;
                });

                // Start connection
                await connection.start();
                
                // Note: In serverless mode, connectionId may not be available
                // We'll track subscriptions client-side
                connectionId = connection.connectionId || 'serverless-mode';
                console.log('SignalR connected! Connection ID:', connectionId);
                
                updateStatus('Connected');
                subscribeBtn.disabled = false;

            } catch (error) {
                console.error('Connection error:', error);
                updateStatus(`Error: ${error.message}`);
                connectBtn.disabled = false;
            }
        }

        function setupEventHandlers() {
            const events = [
                'stepStarted',
                'stepCompleted', 
                'stepFailed',
                'hitlWaiting',
                'hitlApproved',
                'hitlRejected',
                'reasoningChunk',
                'reasoningComplete',
                'workflowStarted',
                'workflowCompleted',
                'workflowFailed'
            ];

            events.forEach(eventName => {
                connection.on(eventName, (message) => {
                    console.log(`[${eventName}]`, message);
                    handleMessage(eventName, message);
                });
            });
        }

        function handleMessage(eventName, message) {
            const data = message.data || message;
            const msgInstanceId = message.instanceId || data.instanceId;
            
            // Filter by subscribed instanceId (if set)
            if (currentInstanceId && msgInstanceId && msgInstanceId !== currentInstanceId) {
                console.log(`Ignoring message for different instance: ${msgInstanceId}`);
                return;
            }
            
            messageCount++;
            messageCountEl.textContent = messageCount;
            
            // Update step progress
            if (eventName === 'stepStarted' && data.stepName) {
                updateStepBadge(data.stepName, 'running');
            } else if (eventName === 'stepCompleted' && data.stepName) {
                updateStepBadge(data.stepName, 'completed');
            } else if (eventName === 'stepFailed' && data.stepName) {
                updateStepBadge(data.stepName, 'failed');
            }

            // Add to all messages
            addMessage(allMessagesEl, eventName, message);

            // Add reasoning chunks to reasoning panel
            if (eventName === 'reasoningChunk' || eventName === 'reasoningComplete') {
                addMessage(reasoningMessagesEl, eventName, message, true);
            }
        }

        function updateStepBadge(stepName, status) {
            const badge = document.querySelector(`[data-step="${stepName}"]`);
            if (badge) {
                badge.className = `step-badge ${status}`;
            }
        }

        function addMessage(container, eventName, message, isReasoning = false) {
            // Remove empty state if present
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const data = message.data || message;
            const timestamp = message.timestamp || new Date().toISOString();
            const time = new Date(timestamp).toLocaleTimeString();

            // Determine message class
            let msgClass = 'message';
            if (eventName.includes('step')) {
                if (eventName === 'stepStarted') msgClass += ' step-started';
                else if (eventName === 'stepCompleted') msgClass += ' step-completed';
                else if (eventName === 'stepFailed') msgClass += ' step-failed';
            } else if (eventName.includes('hitl')) {
                msgClass += ' hitl';
            } else if (eventName.includes('reasoning')) {
                msgClass += ' reasoning';
            } else if (eventName === 'workflowCompleted') {
                msgClass += ' workflow-completed';
            }

            // Build content based on event type
            let content = '';
            if (eventName === 'stepStarted') {
                content = `Step ${data.stepNumber}: ${data.stepDisplayName || data.stepName} started`;
            } else if (eventName === 'stepCompleted') {
                content = `Step ${data.stepNumber}: ${data.stepDisplayName || data.stepName} completed`;
                if (data.durationMs) content += ` (${data.durationMs}ms)`;
            } else if (eventName === 'hitlWaiting') {
                content = `Waiting for human review. ${data.fieldsForReview?.length || 0} fields need review.`;
            } else if (eventName === 'reasoningChunk') {
                content = `[${data.chunkType}] ${data.content}`;
            } else if (eventName === 'workflowCompleted') {
                content = `✅ Workflow completed! Confidence: ${(data.summary?.confidence_score * 100 || 0).toFixed(0)}%`;
            } else {
                content = JSON.stringify(data, null, 2);
            }

            const messageEl = document.createElement('div');
            messageEl.className = msgClass;
            messageEl.innerHTML = `
                <div class="message-header">
                    <span class="message-type">${eventName}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
                ${!isReasoning ? `<div class="message-data">${escapeHtml(JSON.stringify(data, null, 2))}</div>` : ''}
            `;

            container.insertBefore(messageEl, container.firstChild);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function subscribe() {
            const instanceId = instanceIdInput.value.trim();
            if (!instanceId) {
                alert('Please enter an Instance ID');
                return;
            }
            
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                alert('Not connected to SignalR. Please connect first.');
                return;
            }

            try {
                // In serverless mode, we track subscription client-side
                // and filter incoming messages by instanceId
                currentInstanceId = instanceId;
                currentInstance.textContent = instanceId;
                unsubscribeBtn.disabled = false;
                console.log(`Subscribed to workflow: ${instanceId} (client-side filtering)`);

                // Reset step badges
                document.querySelectorAll('.step-badge').forEach(badge => {
                    badge.className = 'step-badge';
                });

            } catch (error) {
                console.error('Subscribe error:', error);
                alert(`Failed to subscribe: ${error.message}`);
            }
        }

        async function unsubscribe() {
            if (!currentInstanceId) return;

            try {
                // Client-side unsubscribe - just clear the tracking
                console.log(`Unsubscribed from workflow: ${currentInstanceId}`);
                currentInstance.textContent = 'None';
                unsubscribeBtn.disabled = true;
                currentInstanceId = null;

            } catch (error) {
                console.error('Unsubscribe error:', error);
            }
        }

        function clearMessages() {
            allMessagesEl.innerHTML = '<div class="empty-state">No messages yet. Connect and subscribe to a workflow.</div>';
            reasoningMessagesEl.innerHTML = '<div class="empty-state">Reasoning chunks will appear here during Step 6.</div>';
            messageCount = 0;
            messageCountEl.textContent = '0';
            
            // Reset step badges
            document.querySelectorAll('.step-badge').forEach(badge => {
                badge.className = 'step-badge';
            });
        }

        // Auto-connect on page load (optional)
        // connect();
    </script>
</body>
</html>
