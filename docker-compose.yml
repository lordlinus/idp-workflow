version: '3.8'

services:
  # Azure Storage Emulator (Azurite)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service
      - "10002:10002"  # Table service
    volumes:
      - ./AzuriteConfig:/data
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==

  # Backend (Azure Functions with Python)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "7071:7071"
    environment:
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - AzureSignalRConnectionString=Endpoint=http://localhost:8080;AccessKey=test;Version=1.0;
      - FUNCTIONS_WORKER_RUNTIME=python
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-test-key}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-http://localhost:8080}
    depends_on:
      - azurite
    volumes:
      - ./:/home/site/wwwroot
    command: func start --build=remote

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:7071/api
    depends_on:
      - backend
    volumes:
      - ./frontend-nextjs:/app
      - /app/node_modules
      - /app/.next

volumes:
  azurite-data:
    driver: local
