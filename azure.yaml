name: idp-workflow
metadata:
  template: idp-workflow@0.0.1
  description: Intelligent Document Processing workflow with Azure Durable Functions, DSPy, and Next.js dashboard
  author: lordlinus
  source: https://github.com/lordlinus/idp-workflow
  tags:
    - azure-functions
    - durable-functions
    - document-intelligence
    - dspy
    - nextjs
    - signalr
    - python
    - ai
hooks:
  postdeploy:
    shell: sh
    run: ./hooks/postdeploy.sh
services:
  api:
    project: .
    language: python
    host: function
  frontend:
    project: frontend
    language: js
    host: staticwebapp
    dist: out
    hooks:
      prebuild:
        shell: sh
        run: |
          # Write the direct Function App URL for SignalR negotiate.
          # SWA's linked-backend proxy intercepts "negotiate" routes with its
          # own auth provider, so the negotiate call must bypass the proxy.
          # All other API calls continue through SWA's /api proxy as normal.
          FUNC_URL=$(azd env get-value FUNCTION_APP_URL 2>/dev/null || echo "")
          if [ -n "$FUNC_URL" ]; then
            echo "NEXT_PUBLIC_FUNCTION_APP_URL=$FUNC_URL" > .env.local
            echo "==> Set NEXT_PUBLIC_FUNCTION_APP_URL=$FUNC_URL"
          else
            echo "==> FUNCTION_APP_URL not found in azd env, negotiate will use /api (local dev)"
          fi
          npm install

