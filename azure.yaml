name: idp-workflow
metadata:
  template: idp-workflow@0.0.1
  description: Intelligent Document Processing workflow with Azure Durable Functions, DSPy, and Next.js dashboard
  author: lordlinus
  source: https://github.com/lordlinus/idp-workflow
  tags:
    - azure-functions
    - durable-functions
    - document-intelligence
    - dspy
    - nextjs
    - signalr
    - python
    - ai
hooks:
  postdeploy:
    shell: sh
    run: ./hooks/postdeploy.sh
services:
  api:
    project: .
    language: python
    host: function
  frontend:
    project: frontend
    language: js
    host: staticwebapp
    dist: out
    hooks:
      prebuild:
        shell: sh
        run: npm install

