name: idp-workflow
metadata:
  template: idp-workflow@0.0.1
hooks:
  postdeploy:
    shell: sh
    run: ./hooks/postdeploy.sh
services:
  api:
    project: .
    language: python
    host: function
  frontend:
    project: frontend
    language: js
    host: staticwebapp
    dist: out
    hooks:
      prebuild:
        shell: sh
        run: npm install

